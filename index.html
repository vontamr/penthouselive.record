<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penthouse Live • Record • Orlando</title>
    
    <script src="https://cdn.tailwindcss.com" async></script>
    <script>
        function initTailwind() {
            tailwind.config = { content: ["./**/*.{html,js}"] };
        }
        window.addEventListener('load', initTailwind);
    </script>

    <style>
        .hero-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        #gate {
            background: rgba(0, 0, 0, 0.75);
        }
        .unmute-btn {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <!-- BACKGROUND VIDEO -->
    <video autoplay loop muted playsinline class="hero-video" id="bg-video">
        <source src="https://raw.githubusercontent.com/vontamr/penthouselive.record/main/assets/video/Penthouse-bg.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Password Gate -->
    <div id="gate" class="fixed inset-0 flex items-center justify-center z-50">
        <div class="text-center max-w-md px-6">
            
            <!-- Main Logo -->
            <img src="https://raw.githubusercontent.com/vontamr/penthouselive.record/main/assets/images/penthouserecords.png"
                 alt="Penthouse Records"
                 class="mx-auto mb-8 w-72">

            <p class="text-xl mb-6 text-gray-300">Downtown Orlando Penthouse • Members Only</p>

            <div class="space-y-8">
                <p class="text-sm uppercase tracking-widest text-red-400">ENTER ACCESS CODE</p>
                
                <input id="password" type="password" placeholder="••••••••"
                       class="w-full bg-black/60 border border-white/30 backdrop-blur-md text-center text-4xl py-6 rounded-3xl focus:outline-none focus:border-red-500 text-white placeholder-gray-500">

                <button onclick="checkPassword()"
                        class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-3xl font-semibold text-lg tracking-wider transition-all active:scale-95">
                    ENTER THE PENTHOUSE
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden min-h-screen flex flex-col">
        
        <!-- Top Bar -->
        <div class="bg-zinc-950/90 backdrop-blur-md border-b border-zinc-800 px-6 py-3 flex items-center justify-between z-50">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/vontamr/penthouselive.record/main/assets/images/penthouserecords.png"
                     alt="Penthouse Records"
                     class="h-11 w-auto">
            </div>
            
            <div class="flex items-center gap-6 text-sm">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
                    <span class="font-medium text-red-500">LIVE</span>
                </div>
                <span class="text-gray-400">14,892 watching</span>
            </div>

            <!-- Manual Unmute Button -->
            <button onclick="toggleMute()" id="unmute-btn"
                    class="unmute-btn flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-white px-5 py-2 rounded-full text-sm font-medium border border-zinc-700">
                <span id="sound-icon">🔇</span>
                <span id="sound-text">Unmute Sound</span>
            </button>

            <button onclick="logout()" 
                    class="text-sm px-6 py-2 border border-zinc-700 hover:border-white rounded-full transition-colors">
                Leave Stream
            </button>
        </div>

        <!-- Video + Chat -->
        <div class="flex flex-1 overflow-hidden">
            <div class="flex-1 relative bg-black">
                <video autoplay loop muted playsinline class="hero-video" id="main-video">
                    <source src="https://raw.githubusercontent.com/vontamr/penthouselive.record/main/assets/video/penthouse-live.mp4" type="video/mp4">
                </video>
                <div class="absolute top-6 left-6 bg-black/70 px-4 py-1 rounded-full text-sm flex items-center gap-2">
                    <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
                    <span>LIVE FROM THE PENTHOUSE</span>
                </div>
            </div>

            <div class="w-96 bg-zinc-950/90 backdrop-blur-md border-l border-zinc-800 flex flex-col">
                <div class="p-4 border-b border-zinc-800 font-medium text-sm flex items-center gap-2">
                    <span class="text-red-500">●</span> LIVE CHAT
                </div>
                <div class="flex-1 p-4 overflow-y-auto text-sm space-y-3 text-gray-300" id="chat">
                    <div><span class="text-emerald-400">@rooftopking</span> This view is insane 🔥</div>
                </div>
                <div class="p-4 border-t border-zinc-800">
                    <input type="text" id="chat-input" placeholder="Type a message..." 
                           class="w-full bg-zinc-900 border border-zinc-700 rounded-full px-5 py-3 text-sm focus:outline-none">
                </div>
            </div>
        </div>
    </div>

    <script>
        const correctPassword = "penthouse2026";
        let isMuted = true;

        const bgVideo = document.getElementById('bg-video');
        const mainVideo = document.getElementById('main-video');

        function toggleMute() {
            isMuted = !isMuted;
            
            if (bgVideo) bgVideo.muted = isMuted;
            if (mainVideo) mainVideo.muted = isMuted;

            const icon = document.getElementById('sound-icon');
            const text = document.getElementById('sound-text');

            if (isMuted) {
                icon.textContent = '🔇';
                text.textContent = 'Unmute Sound';
            } else {
                icon.textContent = '🔊';
                text.textContent = 'Mute Sound';
                // Try to play if it was paused
                bgVideo.play().catch(() => {});
            }
        }

        function checkPassword() {
            const input = document.getElementById('password').value;
            if (input === correctPassword) {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                // Auto unmute after login (best chance)
                setTimeout(() => {
                    isMuted = false;
                    if (bgVideo) {
                        bgVideo.muted = false;
                        bgVideo.play().catch(() => {});
                    }
                }, 500);
            } else {
                alert("Incorrect access code.");
            }
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function logout() {
            if (confirm("Leave the Penthouse stream?")) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('gate').classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
